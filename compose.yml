services:
  minio:
    image: minio/minio:latest
    container_name: s3em-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  s3em:
    build: .
    container_name: s3em
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "4004:4004"
    environment:
      RUST_LOG: info
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 4004
      DATABASE_URL: /data/s3em.db
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: s3manager
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_PATH_STYLE: "true"
      JWT_SECRET: change-me-in-production
      MASTER_API_KEY: dev-key-123
    volumes:
      - s3em_data:/data
    restart: unless-stopped

volumes:
  minio_data:
  s3em_data: